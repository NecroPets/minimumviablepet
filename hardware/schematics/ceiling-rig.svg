<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="monospace">
  <!-- Tier 3 ceiling pan/tilt rig — SIDE VIEW assembly. -->
  <rect width="760" height="560" fill="white"/>
  <text x="20" y="30" font-size="16" fill="#111">Tier 3 · ceiling pan/tilt rig · side view</text>

  <!-- ceiling with joist -->
  <rect x="20" y="60" width="720" height="14" fill="#ddd" stroke="#999"/>
  <rect x="300" y="60" width="120" height="14" fill="#c8a878"/>
  <text x="306" y="52" font-size="12" fill="#8a6a3a">JOIST or structural anchor — never drywall alone</text>

  <!-- mounting plate + bolts -->
  <rect x="310" y="74" width="100" height="10" fill="#555"/>
  <line x1="325" y1="60" x2="325" y2="84" stroke="#111" stroke-width="3"/>
  <line x1="395" y1="60" x2="395" y2="84" stroke="#111" stroke-width="3"/>
  <text x="424" y="86" font-size="12" fill="#111">plate rated ≥ 4× hung weight</text>

  <!-- pan servo -->
  <rect x="338" y="84" width="44" height="30" fill="#2a6bd4"/>
  <text x="392" y="106" font-size="12" fill="#2a6bd4">PAN servo (metal gear, ≥25 kg·cm)</text>

  <!-- bracket -->
  <path d="M 360 114 L 360 160 L 320 160 L 320 210" stroke="#111" stroke-width="6" fill="none"/>

  <!-- tilt servo -->
  <rect x="300" y="196" width="40" height="28" fill="#2a6bd4"/>
  <text x="348" y="216" font-size="12" fill="#2a6bd4">TILT servo</text>

  <!-- projector -->
  <rect x="240" y="228" width="150" height="54" rx="6" fill="#222"/>
  <circle cx="252" cy="255" r="10" fill="#e08a00"/>
  <text x="398" y="252" font-size="12" fill="#111">compact projector ≤ 1 kg,</text>
  <text x="398" y="268" font-size="12" fill="#555">vents unblocked at every angle you preset</text>

  <!-- safety cable -->
  <path d="M 405 74 C 470 130 430 200 388 236" stroke="#c22" stroke-width="2.5" fill="none" stroke-dasharray="7 5"/>
  <text x="470" y="150" font-size="12" fill="#c22">steel SAFETY CABLE, slack,</text>
  <text x="470" y="166" font-size="12" fill="#c22">projector → structure —</text>
  <text x="470" y="182" font-size="12" fill="#c22">catches it if every screw fails</text>

  <!-- beam to floor/scrim -->
  <polygon points="244,262 90,420 190,470" fill="#e08a00" opacity="0.14"/>
  <line x1="244" y1="262" x2="90" y2="420" stroke="#e08a00" stroke-width="1.3" stroke-dasharray="6 4"/>
  <line x1="244" y1="262" x2="190" y2="470" stroke="#e08a00" stroke-width="1.3" stroke-dasharray="6 4"/>
  <line x1="20" y1="500" x2="740" y2="500" stroke="#111" stroke-width="2"/>
  <text x="60" y="492" font-size="12" fill="#555">beam lands ON surfaces — scrim, wall, floor. The rig chooses which one; physics still gets a vote.</text>

  <!-- ESP32 note -->
  <rect x="560" y="330" width="150" height="60" rx="6" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="572" y="352" font-size="12" fill="#111">ESP32 + 5 V 4 A PSU</text>
  <text x="572" y="368" font-size="12" fill="#555">on the ceiling plate,</text>
  <text x="572" y="382" font-size="12" fill="#555">see pan-tilt-wiring.svg</text>

  <text x="20" y="532" font-size="12" fill="#c22">Mount NOTHING over a bed, a crib, or a couch headrest. Aim presets so the beam can never sweep seated eye level.</text>
  <text x="20" y="550" font-size="12" fill="#555">bench-test servo sweep limits with the projector OFF the bracket first — firmware/pan-tilt/ ships with soft limits you set then.</text>
</svg>
