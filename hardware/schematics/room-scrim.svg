<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="monospace">
  <!-- Tier 2 room scrim — ROOM CROSS-SECTION, rear projection. -->
  <rect width="900" height="480" fill="white"/>
  <text x="20" y="30" font-size="16" fill="#111">Tier 2 · room scrim · cross-section (rear projection)</text>

  <!-- floor + ceiling -->
  <line x1="20" y1="420" x2="880" y2="420" stroke="#111" stroke-width="2"/>
  <line x1="20" y1="70" x2="880" y2="70" stroke="#999" stroke-width="1"/>
  <text x="826" y="440" font-size="12" fill="#111">floor</text>

  <!-- viewer -->
  <circle cx="110" cy="240" r="10" fill="none" stroke="#111" stroke-width="2"/>
  <circle cx="114" cy="240" r="3" fill="#111"/>
  <line x1="110" y1="250" x2="110" y2="420" stroke="#111" stroke-width="2"/>
  <text x="78" y="215" font-size="13" fill="#111">viewer</text>

  <!-- scrim -->
  <line x1="430" y1="90" x2="430" y2="420" stroke="#2a6bd4" stroke-width="3" stroke-dasharray="8 5"/>
  <text x="438" y="108" font-size="13" fill="#2a6bd4">mesh scrim (voile/holo-gauze), stretched WRINKLE-FREE</text>
  <text x="438" y="124" font-size="12" fill="#2a6bd4">hung from rod / track / mic-stand crossbar</text>

  <!-- figure on scrim -->
  <ellipse cx="430" cy="330" rx="34" ry="52" fill="#9fd6a8" opacity="0.6"/>
  <text x="366" y="398" font-size="12" fill="#3a7a46">the shape, floating in the dark</text>

  <!-- projector behind scrim -->
  <rect x="640" y="300" width="80" height="36" rx="4" fill="#222"/>
  <line x1="680" y1="336" x2="680" y2="420" stroke="#111" stroke-width="2"/>
  <text x="628" y="292" font-size="13" fill="#111">projector, BEHIND the scrim</text>
  <text x="628" y="360" font-size="12" fill="#555">on a stand that nothing vibrates</text>

  <!-- beam -->
  <polygon points="640,318 430,260 430,400" fill="#e08a00" opacity="0.16"/>
  <line x1="640" y1="318" x2="430" y2="260" stroke="#e08a00" stroke-width="1.4" stroke-dasharray="6 4"/>
  <line x1="640" y1="318" x2="430" y2="400" stroke="#e08a00" stroke-width="1.4" stroke-dasharray="6 4"/>

  <!-- black backdrop -->
  <line x1="840" y1="90" x2="840" y2="420" stroke="#111" stroke-width="8"/>
  <text x="700" y="108" font-size="13" fill="#111">matte black backdrop —</text>
  <text x="700" y="124" font-size="12" fill="#555">eats the light that passes through the mesh</text>

  <!-- distances -->
  <g stroke="#c22" stroke-width="1" fill="none">
    <line x1="110" y1="450" x2="430" y2="450"/>
    <line x1="430" y1="450" x2="680" y2="450"/>
    <line x1="110" y1="445" x2="110" y2="455"/>
    <line x1="430" y1="445" x2="430" y2="455"/>
    <line x1="680" y1="445" x2="680" y2="455"/>
  </g>
  <g font-size="12" fill="#c22">
    <text x="200" y="466">viewer ≥ 2 m (closer and the weave reads)</text>
    <text x="470" y="466">throw d · image width = d ÷ throw ratio</text>
  </g>

  <text x="20" y="55" font-size="12" fill="#555">room lights: OFF or very dim. rear projection = brighter figure + nobody walks through the beam.</text>
</svg>
