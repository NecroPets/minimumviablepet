<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" font-family="monospace">
  <!-- Tier 1 desk box — SIDE VIEW (not to scale; the one dimension that is
       law: the acrylic sits at exactly 45°). -->
  <rect width="800" height="520" fill="white"/>
  <text x="20" y="30" font-size="16" fill="#111">Tier 1 · desk box · side view (viewer at left)</text>

  <!-- box -->
  <g stroke="#111" stroke-width="2" fill="none">
    <path d="M 200 120 L 700 120 L 700 420 L 200 420"/> <!-- top, back, bottom -->
    <line x1="200" y1="120" x2="200" y2="210"/>          <!-- front upper lip -->
    <line x1="200" y1="330" x2="200" y2="420"/>          <!-- front lower lip -->
  </g>
  <text x="150" y="275" font-size="13" fill="#111">viewing</text>
  <text x="150" y="290" font-size="13" fill="#111">window</text>

  <!-- monitor lying flat, screen up -->
  <rect x="260" y="392" width="380" height="16" fill="#222"/>
  <rect x="270" y="388" width="360" height="6" fill="#7fd0ff"/>
  <text x="300" y="440" font-size="13" fill="#111">monitor flat on floor of box, SCREEN UP</text>

  <!-- 45° acrylic: from low-front to high-back across the box -->
  <line x1="240" y1="400" x2="520" y2="120" stroke="#2a6bd4" stroke-width="3"/>
  <text x="410" y="250" font-size="13" fill="#2a6bd4" transform="rotate(-45 410 250)">clear acrylic · 45° exactly</text>

  <!-- light path: screen up to acrylic, reflect to viewer -->
  <g stroke="#e08a00" stroke-width="1.6" fill="none" stroke-dasharray="6 4">
    <line x1="450" y1="388" x2="450" y2="190"/>
    <line x1="450" y1="190" x2="205" y2="190"/>
  </g>
  <polygon points="205,190 217,184 217,196" fill="#e08a00"/>
  <text x="455" y="300" font-size="12" fill="#e08a00">light path</text>

  <!-- virtual image behind the glass -->
  <g opacity="0.55">
    <ellipse cx="560" cy="280" rx="46" ry="30" fill="#9fd6a8"/>
    <text x="518" y="330" font-size="12" fill="#3a7a46">the figure appears HERE,</text>
    <text x="518" y="344" font-size="12" fill="#3a7a46">as deep behind the glass as</text>
    <text x="518" y="358" font-size="12" fill="#3a7a46">the screen is below it</text>
  </g>

  <!-- eye -->
  <circle cx="80" cy="190" r="10" fill="none" stroke="#111" stroke-width="2"/>
  <circle cx="84" cy="190" r="3" fill="#111"/>
  <text x="52" y="220" font-size="13" fill="#111">viewer</text>

  <!-- black interior callouts -->
  <g font-size="12" fill="#555">
    <text x="210" y="105">interior + back wall: MATTE BLACK — every stray reflection is a broken illusion</text>
    <text x="20" y="480">sizing: floating figure height ≈ panel depth × 0.71 · feed /emanate/ fullscreen (single view)</text>
    <text x="20" y="500">keep room light off the viewing window; a cardboard hood over the front helps more than a brighter panel</text>
  </g>
</svg>
