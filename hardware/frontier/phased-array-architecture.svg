<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="monospace">
  <!-- Tier 4 — 16x16 ultrasound phased array, block architecture.
       Documentation of the research-bench build; firmware intentionally
       not shipped here (see frontier/README.md — build on OpenMPD/SonicSurface). -->
  <rect width="880" height="560" fill="white"/>
  <text x="20" y="30" font-size="16" fill="#111">Tier 4 · 40 kHz phased array · block architecture (research bench)</text>

  <!-- controller -->
  <rect x="40" y="80" width="200" height="110" rx="8" fill="#eef" stroke="#2a6bd4" stroke-width="2"/>
  <text x="56" y="106" font-size="14" fill="#2a6bd4">controller</text>
  <text x="56" y="126" font-size="12" fill="#111">Teensy 4.1 or FPGA</text>
  <text x="56" y="142" font-size="12" fill="#555">40 kHz master clock,</text>
  <text x="56" y="158" font-size="12" fill="#555">256 phase-locked outputs,</text>
  <text x="56" y="174" font-size="12" fill="#555">≥ 16 phase steps / cycle</text>

  <!-- phase LUT -->
  <rect x="300" y="80" width="200" height="110" rx="8" fill="#f7f7f7" stroke="#111" stroke-width="2"/>
  <text x="316" y="106" font-size="14" fill="#111">phase table</text>
  <text x="316" y="128" font-size="12" fill="#111">τᵢ = (dᵢ − d_min) / c</text>
  <text x="316" y="146" font-size="12" fill="#555">dᵢ = |transducerᵢ − F|</text>
  <text x="316" y="162" font-size="12" fill="#555">c = 343 m/s · recompute</text>
  <text x="316" y="178" font-size="12" fill="#555">per focal point F</text>

  <!-- drivers -->
  <rect x="560" y="80" width="200" height="110" rx="8" fill="#fff4f4" stroke="#c22" stroke-width="2"/>
  <text x="576" y="106" font-size="14" fill="#c22">drive stage</text>
  <text x="576" y="126" font-size="12" fill="#111">shift registers →</text>
  <text x="576" y="142" font-size="12" fill="#111">half-bridge drivers</text>
  <text x="576" y="158" font-size="12" fill="#555">12–24 V square wave,</text>
  <text x="576" y="174" font-size="12" fill="#555">one channel per transducer</text>

  <!-- arrows -->
  <g stroke="#111" stroke-width="2" fill="none">
    <line x1="240" y1="135" x2="300" y2="135"/>
    <line x1="500" y1="135" x2="560" y2="135"/>
    <line x1="660" y1="190" x2="660" y2="240"/>
  </g>
  <polygon points="300,135 288,129 288,141" fill="#111"/>
  <polygon points="560,135 548,129 548,141" fill="#111"/>
  <polygon points="660,240 654,228 666,228" fill="#111"/>

  <!-- transducer grid -->
  <g fill="none" stroke="#111" stroke-width="1.5">
    <rect x="420" y="240" width="420" height="200" rx="8"/>
  </g>
  <text x="436" y="264" font-size="14" fill="#111">16 × 16 transducer grid, rigid plate</text>
  <text x="436" y="282" font-size="12" fill="#555">10 mm 40 kHz transducers (MA40S4S class), 10.5 mm pitch</text>
  <g fill="#2a6bd4">
    <!-- a suggestion of the grid -->
    <circle cx="470" cy="330" r="6"/><circle cx="500" cy="330" r="6"/><circle cx="530" cy="330" r="6"/><circle cx="560" cy="330" r="6"/><circle cx="590" cy="330" r="6"/>
    <circle cx="470" cy="360" r="6"/><circle cx="500" cy="360" r="6"/><circle cx="530" cy="360" r="6"/><circle cx="560" cy="360" r="6"/><circle cx="590" cy="360" r="6"/>
    <circle cx="470" cy="390" r="6"/><circle cx="500" cy="390" r="6"/><circle cx="530" cy="390" r="6"/><circle cx="560" cy="390" r="6"/><circle cx="590" cy="390" r="6"/>
    <text x="620" y="365" font-size="12" fill="#555">… × 256</text>
  </g>

  <!-- focal point -->
  <g stroke="#e08a00" stroke-width="1.2" stroke-dasharray="5 4" fill="none">
    <line x1="470" y1="324" x2="640" y2="210"/>
    <line x1="530" y1="324" x2="640" y2="210"/>
    <line x1="590" y1="324" x2="640" y2="210"/>
  </g>
  <circle cx="640" cy="210" r="7" fill="#e08a00"/>
  <text x="656" y="206" font-size="12" fill="#e08a00">focal point F: levitates a 1–2 mm bead,</text>
  <text x="656" y="222" font-size="12" fill="#e08a00">or a pressure spot your palm can feel</text>

  <!-- capability truth table -->
  <g font-size="12" fill="#111">
    <text x="40" y="470">truth table: bead levitation ✓ · palm-feelable focal point ✓ · slow cm-scale glowing trace (bead + RGB) — hard, real, documented</text>
    <text x="40" y="490" fill="#c22">room-scale visible pet ✗ (physics, not budget) — that job belongs to the Tier 2 scrim</text>
    <text x="40" y="510" fill="#555">firmware: build on OpenMPD (UCL) / SonicSurface — this repo deliberately ships none for this tier</text>
    <text x="40" y="530" fill="#c22">animals still living in the house hear 40 kHz hardware. Short sessions, aimed away from where they rest. Watch their ears.</text>
  </g>
</svg>
